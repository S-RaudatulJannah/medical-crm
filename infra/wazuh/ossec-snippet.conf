<!--
══════════════════════════════════════════════════════════════
Medical CRM — Wazuh ossec.conf Snippet
══════════════════════════════════════════════════════════════

APA INI?
Ini adalah potongan konfigurasi yang harus DITAMBAHKAN ke file
/var/ossec/etc/ossec.conf di Ubuntu Server kalian.

JANGAN replace seluruh file ossec.conf! Cukup tambahkan blok-blok
di bawah ini ke dalam tag <ossec_config> yang sudah ada.

CARA PASANG:
  sudo nano /var/ossec/etc/ossec.conf
  (Tambahkan blok-blok di bawah sebelum tag </ossec_config> penutup)
  sudo systemctl restart wazuh-manager
══════════════════════════════════════════════════════════════
-->

<!-- ══════════════════════════════════════════════════ -->
<!-- BLOK 1: Monitor log file Medical CRM             -->
<!-- ══════════════════════════════════════════════════ -->
<!-- Ini mengajarkan Wazuh DIMANA file log kita berada -->
<!-- dan BAGAIMANA cara membacanya (format JSON).      -->
<!-- Wazuh Agent akan terus memantau file ini.         -->
<!-- Setiap baris baru yang muncul → langsung diproses.-->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/medical-crm/security_events.json</location>
</localfile>

<!-- ══════════════════════════════════════════════════ -->
<!-- BLOK 2: Integrasi Telegram Bot                   -->
<!-- ══════════════════════════════════════════════════ -->
<!-- Ini memberitahu Wazuh: "Kalau ada alert level 7   -->
<!-- atau lebih dari group medical-crm, jalankan script -->
<!-- custom-telegram.sh untuk kirim notifikasi."       -->
<!--                                                    -->
<!-- <level>7</level> = minimum severity untuk trigger  -->
<!-- <group>medical-crm</group> = hanya dari rules kita -->
<!-- <alert_format>json</alert_format> = kirim data     -->
<!--   sebagai JSON ke script (agar bisa di-parse jq)   -->
<integration>
  <name>custom-telegram.sh</name>
  <level>7</level>
  <group>medical-crm</group>
  <alert_format>json</alert_format>
</integration>
